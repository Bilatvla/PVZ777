<!DOCTYPE html>
<html lang="ru"><head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Вход для сотрудников</title>
<link rel="stylesheet" href="../assets/css/style.css" />
<script defer src="../assets/js/auth.js"></script>
</head>
<body class="login-page">
<header class="site-header"><div class="header-shell"><div class="brand"><div class="brand-mark"></div><div><div class="brand-title">PVZ Portal</div><div class="brand-subtitle">Раздел сотрудников</div></div></div></div></header>
<main class="page">
<section class="surface login-surface">
<div class="login-box">
<div class="eyebrow">Защищённый доступ</div>
<h1>Вход для сотрудников</h1>
<p class="lead" style="color:#6f6786">После ввода пароля вы попадёте сразу в раздел сотрудников.</p>
<label class="field-label" for="password">Пароль</label>
<input id="password" class="input" type="password" placeholder="Введите пароль" />
<button class="btn btn-primary btn-full" onclick="(function(){const i=document.getElementById('password');const e=document.getElementById('error-message');if(i.value.trim()===PORTAL_PASSWORD){sessionStorage.setItem(AUTH_KEY,'1');window.location.href='index.html';}else{e.textContent='Неверный пароль. Попробуйте еще раз.';}})()">Войти</button>
<p id="error-message" class="error-text"></p>
</div></section></main></body></html>
